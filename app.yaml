# Google Cloud App Engine Configuration for Vite + React Application
service: vocab
runtime: nodejs22

# Environment variables
env_variables:
  NODE_ENV: 'production'

# Automatic scaling configuration
automatic_scaling:
  min_instances: 1
  max_instances: 10


# Handlers for static files and routing
handlers:
  # Generated JS/CSS assets with immutable hashing
  - url: /assets
    static_dir: dist/assets
    secure: always
    redirect_http_response_code: 301
    http_headers:
      Cache-Control: "public, max-age=31536000, immutable"

  # PWA screenshots referenced by the manifest
  - url: /screenshots
    static_dir: dist/screenshots
    secure: always
    redirect_http_response_code: 301
    http_headers:
      Cache-Control: "public, max-age=31536000, immutable"

  # Web app manifest
  - url: /manifest.webmanifest
    static_files: dist/manifest.webmanifest
    upload: dist/manifest.webmanifest
    mime_type: application/manifest+json
    secure: always
    redirect_http_response_code: 301
    http_headers:
      Cache-Control: "public, max-age=0, must-revalidate"

  # Other root-level static files (logo, service worker, source maps, etc.)
  - url: /([^/]+\.(js|svg|map|ico|png|jpg|jpeg|gif|webp|woff|woff2|json))$
    static_files: dist/\1
    upload: dist/[^/]+\.(js|svg|map|ico|png|jpg|jpeg|gif|webp|woff|woff2|json)$
    secure: always
    redirect_http_response_code: 301
    http_headers:
      Cache-Control: "public, max-age=31536000, immutable"

  # Serve index.html for all other routes (SPA routing)
  - url: /.*
    static_files: dist/index.html
    upload: dist/index.html
    secure: always
    redirect_http_response_code: 301
    http_headers:
      Cache-Control: "public, max-age=0, must-revalidate"